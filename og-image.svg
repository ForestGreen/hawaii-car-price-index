      <stop offset="0%" style="stop-color:#001a33"/>
      <stop offset="40%" style="stop-color:#003366"/>
      <stop offset="100%" style="stop-color:#004C99"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Wave decoration -->
  <path d="M0 520 Q300 480 600 520 Q900 560 1200 520 L1200 630 L0 630Z" fill="rgba(255,255,255,0.05)"/>
  <path d="M0 550 Q300 510 600 550 Q900 590 1200 550 L1200 630 L0 630Z" fill="rgba(255,255,255,0.03)"/>
  <!-- Logo area -->
  <text x="600" y="180" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="3">HAWAII</text>
  <!-- Main title -->
  <text x="600" y="260" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">Car Price Index</text>
