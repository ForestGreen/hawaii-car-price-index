<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Hawaii Car Price Index</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #0066cc 0%, #004a99 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 24px;
            font-weight: 700;
        }

        header a:hover {
            opacity: 0.9;
        }

        main {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #0066cc;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #222;
        }

        .message {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        a.link-button {
            display: inline-block;
            padding: 12px 24px;
            background: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background 0.2s;
        }

        a.link-button:hover {
            background: #004a99;
        }

        a.link-button.secondary {
            background: #e9f0ff;
            color: #0066cc;
        }

        a.link-button.secondary:hover {
            background: #d1e3ff;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
            border-top: 1px solid #e0e0e0;
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">🌺 Hawaii Car Price Index</a>
    </header>

    <main>
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p class="message">Looks like this road doesn't go through. Let's get you back on track.</p>

        <div class="nav-links">
            <a href="/" class="link-button">Home</a>
            <a href="/#calculator" class="link-button">Price Calculator</a>
            <a href="/#guides" class="link-button secondary">Popular Guides</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Hawaii Car Price Index. All rights reserved.</p>
    </footer>
</body>
</html>
